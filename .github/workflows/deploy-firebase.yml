# main 브랜치에 푸시하면 Firebase Hosting에 자동 배포
name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: react-app/package-lock.json

      - name: Install & build React + copy legacy to dist/html
        run: npm ci --prefix react-app && npm run build

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
